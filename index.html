<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Strike — Solo Training</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --lime:#b8f536;--lime-dim:#7aab1f;--white:#f0eeea;--off:#c8c6bc;--muted:#6a6860;
  --card:#111;--border:rgba(255,255,255,.08);
  --speed:#f59e0b;--kick:#e84c3d;--iq:#38bdf8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:0 16px 60px}

.header{padding:28px 0 18px;text-align:center;border-bottom:1px solid var(--border);margin-bottom:24px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;color:var(--lime);line-height:1}
.logo-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:2px}

/* TRACK PROGRESS BARS */
.tracks{display:flex;gap:10px;margin-bottom:28px}
.track{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.track-icon{font-size:22px;margin-bottom:4px}
.track-name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.track-name.speed{color:var(--speed)}
.track-name.kick{color:var(--kick)}
.track-name.iq{color:var(--iq)}
.track-bar-track{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:6px}
.track-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.track-bar-fill.speed{background:var(--speed)}
.track-bar-fill.kick{background:var(--kick)}
.track-bar-fill.iq{background:var(--iq)}
.track-level{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}

/* SECTION HEADER */
.sec-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:600}

/* SESSION CARDS - CHOICE SCREEN */
.choices{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.choice-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:16px}
.choice-card:hover{border-color:rgba(255,255,255,.2);transform:translateY(-1px)}
.choice-card.speed{border-left:3px solid var(--speed)}
.choice-card.kick{border-left:3px solid var(--kick)}
.choice-card.iq{border-left:3px solid var(--iq)}
.choice-card.locked{opacity:.4;cursor:not-allowed}
.choice-card.locked:hover{transform:none;border-color:var(--border)}
.choice-icon{font-size:28px;flex-shrink:0;width:44px;text-align:center}
.choice-info{flex:1}
.choice-track-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.choice-track-label.speed{color:var(--speed)}
.choice-track-label.kick{color:var(--kick)}
.choice-track-label.iq{color:var(--iq)}
.choice-title{font-size:16px;font-weight:600;margin-bottom:3px}
.choice-desc{font-size:12px;color:var(--muted);line-height:1.5}
.choice-level{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px}
.choice-arrow{font-size:18px;color:var(--muted);flex-shrink:0}
.lock-icon{font-size:18px;flex-shrink:0}

/* SESSION DETAIL VIEW */
#sessionView{display:none}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;margin-bottom:18px;font-family:'DM Sans',sans-serif;padding:0}
.back-btn:hover{color:var(--off)}
.session-hero{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.session-hero.speed{border-top:3px solid var(--speed)}
.session-hero.kick{border-top:3px solid var(--kick)}
.session-hero.iq{border-top:3px solid var(--iq)}
.session-hero-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.session-hero-label.speed{color:var(--speed)}
.session-hero-label.kick{color:var(--kick)}
.session-hero-label.iq{color:var(--iq)}
.session-hero-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:var(--white);margin-bottom:8px}
.session-hero-desc{font-size:13px;color:var(--off);line-height:1.7}

.task-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.task-card.done{border-color:rgba(184,245,54,.35)}
.task-top{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.task-cb{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s}
.task-card.done .task-cb{background:var(--lime);border-color:var(--lime);color:#111}
.task-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0;width:14px}
.task-text{flex:1;font-size:14px;font-weight:500}
.task-card.done .task-text{color:var(--muted);text-decoration:line-through}
.task-watch{flex-shrink:0;font-size:11px;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);white-space:nowrap;transition:all .15s}
.task-watch:hover{color:var(--lime);border-color:rgba(184,245,54,.3)}
.task-card.warmup{border-style:dashed;background:rgba(255,255,255,.015)}
.task-card.warmup .task-num{color:var(--lime-dim)}
.warmup-badge{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--lime-dim);font-weight:700;margin-right:4px}

.complete-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--lime);color:#0d1a0d;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.complete-btn:hover{background:#cffb50}
.complete-btn:disabled{opacity:.3;cursor:not-allowed}

/* UNLOCK TOAST */
.unlock-toast{display:none;background:rgba(184,245,54,.08);border:1px solid rgba(184,245,54,.3);border-radius:10px;padding:16px 18px;margin-top:14px;text-align:center}
.unlock-toast.show{display:block;animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.unlock-toast-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--lime-dim);margin-bottom:4px}
.unlock-toast-title{font-size:15px;font-weight:600}

.intro-note{font-size:12px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.7;padding:0 10px}

@media(max-width:480px){
  .tracks{flex-direction:column}
  .logo{font-size:36px}
  .session-hero-title{font-size:26px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Summer Strike</div>
    <div class="logo-sub">Solo Striker Training</div>
  </div>

  <p class="intro-note">Pick any session below. Speed, Power, or IQ — train whatever you want, whenever you want. Finish a session and the next, harder one in that track unlocks.</p>

  <div class="tracks" id="tracks"></div>

  <div id="chooseView">
    <div class="sec-title">Choose your next session</div>
    <div class="choices" id="choices"></div>
  </div>

  <div id="sessionView">
    <button class="back-btn" onclick="goBack()">← Back to sessions</button>
    <div id="sessionContent"></div>
  </div>
</div>

<script>
const SK = 'ss_solo_v1';

// ─── DATA: each track has progressive levels. Completing level N unlocks level N+1. ───
const TRACKS = {
  speed: {
    name: 'Speed', icon: '⚡', color: 'speed',
    levels: [
      {
        title: 'Speed — Level 1: First Steps',
        desc: 'Learn the basic sprint position and how to push off the ground hard. Just 3 simple things today.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the short clip on sprint starts', v:'https://www.youtube.com/shorts/YQ2IGUOrt6Q'},
          {t:'5 falling starts — lean forward until you have to run', v:'https://www.youtube.com/watch?v=_u5pyVYjmgk'},
          {t:'5 sprints of 15m — go as fast as you can, walk back to rest', v:'https://www.youtube.com/watch?v=2Dt2DbjAKbo'}
        ]
      },
      {
        title: 'Speed — Level 2: Building Speed',
        desc: 'Now we add more sprints and a longer distance. Push a little harder than last time.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'A-skip drill — 2 sets of 15m, focus on knee drive', v:'https://www.youtube.com/watch?v=twmQ9cpCI48'},
          {t:'6 sprints of 20m — full rest between each one', v:'https://www.youtube.com/watch?v=2Dt2DbjAKbo'},
          {t:'Agility ladder — 2 trips through, any pattern', v:'https://www.youtube.com/watch?v=6NnGQl-TZHs'}
        ]
      },
      {
        title: 'Speed — Level 3: Change of Direction',
        desc: 'Speed in a straight line is good. Speed that changes direction is better. Today we add cuts.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the change of direction clip first', v:'https://www.youtube.com/watch?v=f6TRC2zHkJY'},
          {t:'5 sprints of 20m, cut hard left at the cone, sprint 5 more', v:'https://www.youtube.com/watch?v=f6TRC2zHkJY'},
          {t:'5 sprints of 20m, cut hard right at the cone, sprint 5 more', v:'https://www.youtube.com/watch?v=f6TRC2zHkJY'}
        ]
      },
      {
        title: 'Speed — Level 4: Top Speed',
        desc: 'Time to find your top gear. These sprints are longer — give full effort and take full rest.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the top speed sprint clip', v:'https://www.youtube.com/watch?v=BswRzWK5e0o'},
          {t:'6 sprints of 30m at max effort — rest 60 sec between each', v:'https://www.youtube.com/watch?v=BswRzWK5e0o'},
          {t:'2 sprints of 40m — push all the way through the line', v:'https://www.youtube.com/watch?v=BswRzWK5e0o'}
        ]
      },
      {
        title: 'Speed — Level 5: Game Speed',
        desc: 'The hardest speed session. Sprint, recover fast, sprint again — just like a real match.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the quickness and agility clip', v:'https://www.youtube.com/shorts/YQ2IGUOrt6Q'},
          {t:'8 sprints of 20m with only 30 sec rest between each', v:'https://www.youtube.com/watch?v=2Dt2DbjAKbo'},
          {t:'Finish with 1 max-effort 40m sprint — your fastest of the day', v:'https://www.youtube.com/watch?v=BswRzWK5e0o'}
        ]
      }
    ]
  },
  kick: {
    name: 'Power Kicks', icon: '🎯', color: 'kick',
    levels: [
      {
        title: 'Power Kicks — Level 1: The Basics',
        desc: 'Every powerful shot starts with the same setup. Learn it slow before we add speed.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the short clip on shooting technique', v:'https://www.youtube.com/shorts/W6Kv5jVQ7bo'},
          {t:'10 shots from a standing ball — plant foot beside the ball, lock your ankle', v:'https://www.youtube.com/watch?v=_f9ZIh8ESn4'},
          {t:'10 more shots, same technique, both feet', v:'https://www.youtube.com/watch?v=_f9ZIh8ESn4'}
        ]
      },
      {
        title: 'Power Kicks — Level 2: Adding Power',
        desc: 'Same technique, more power. The power comes from your hips, not your leg muscles.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the power technique clip', v:'https://www.youtube.com/watch?v=ipzEbfqAi2Y'},
          {t:'12 shots — focus on turning your hips through the ball', v:'https://www.youtube.com/watch?v=ipzEbfqAi2Y'},
          {t:'10 shots with your weak foot — same technique', v:'https://www.youtube.com/watch?v=ipzEbfqAi2Y'}
        ]
      },
      {
        title: 'Power Kicks — Level 3: Moving Shots',
        desc: 'Shooting while standing still is easy. Now let\'s shoot while moving — like in a real game.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the moving shot technique clip', v:'https://www.youtube.com/watch?v=_f9ZIh8ESn4'},
          {t:'15 shots — jog up to the ball and strike it on the move', v:'https://www.youtube.com/watch?v=_f9ZIh8ESn4'},
          {t:'10 shots aiming for the corners — low and hard', v:'https://www.youtube.com/watch?v=1zNDn5ZKuBU'}
        ]
      },
      {
        title: 'Power Kicks — Level 4: Toss & Volley',
        desc: 'Volleys are tricky — you have to time the strike perfectly. Toss the ball up yourself and practice.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the volley technique clip', v:'https://www.youtube.com/watch?v=J1dfNXY3yMI'},
          {t:'10 volleys — toss the ball up, strike it before it bounces', v:'https://www.youtube.com/watch?v=J1dfNXY3yMI'},
          {t:'15 long-range shots from outside the box — aim low corners', v:'https://www.youtube.com/watch?v=1zNDn5ZKuBU'}
        ]
      },
      {
        title: 'Power Kicks — Level 5: Game Finisher',
        desc: 'The hardest shooting session. Sprint first, then finish — exactly how it feels in a real match.',
        tasks: [
          {t:'Warm up first — 5 min dynamic warm-up (leg swings, high knees, hip circles)', v:'https://www.youtube.com/shorts/BJTLAs43nkE', warmup:true},
          {t:'Watch the game-speed finishing clip', v:'https://www.youtube.com/watch?v=qg2SKFk1_D8'},
          {t:'Sprint 20m, then strike — 10 reps, full effort every time', v:'https://www.youtube.com/watch?v=qg2SKFk1_D8'},
          {t:'10 finishing reps using only your weak foot', v:'https://www.youtube.com/watch?v=ipzEbfqAi2Y'}
        ]
      }
    ]
  },
  iq: {
    name: 'Game IQ', icon: '🧠', color: 'iq',
    levels: [
      {
        title: 'Game IQ — Level 1: Look First',
        desc: 'The best players check around them before the ball even arrives. Let\'s build that habit.',
        tasks: [
          {t:'Watch the short clip on checking your shoulder', v:'https://www.youtube.com/shorts/WO07VKhU3Wk'},
          {t:'Pass the ball against a wall 15 times — look behind you before each touch', v:'https://www.youtube.com/watch?v=1oxaF_Mx6Ok'},
          {t:'Practice receiving at an angle, not facing straight ahead — 10 reps', v:'https://www.youtube.com/watch?v=zk2Sua-rr3Y'}
        ]
      },
      {
        title: 'Game IQ — Level 2: When to Scan',
        desc: 'There are 3 perfect moments to look around during a game. Today we learn what they are.',
        tasks: [
          {t:'Watch the "when to scan" clip', v:'https://www.youtube.com/shorts/K8jTWP6Stj4'},
          {t:'Wall passing — scan once before you receive, once after, 15 reps', v:'https://www.youtube.com/watch?v=1oxaF_Mx6Ok'},
          {t:'Dribble through 4 cones, head up the whole time', v:'https://www.youtube.com/watch?v=7Ot-JKwKFi4'}
        ]
      },
      {
        title: 'Game IQ — Level 3: Reading a Defender',
        desc: 'Cones can act like a defender. Learn to read which way to go based on how they\'re facing.',
        tasks: [
          {t:'Watch the 1v1 dribbling move clip', v:'https://www.youtube.com/shorts/PQ_P_-p9W-k'},
          {t:'Set up a cone — dribble at it, fake one way, go the other. 10 reps', v:'https://www.youtube.com/watch?v=5mQ4QbKHT_Y'},
          {t:'Same drill, but finish with a shot every time — 10 reps', v:'https://www.youtube.com/watch?v=5mQ4QbKHT_Y'}
        ]
      },
      {
        title: 'Game IQ — Level 4: Finding Space',
        desc: 'Great strikers don\'t stand still. Learn to find pockets of space and attack them.',
        tasks: [
          {t:'Watch the finding space clip', v:'https://www.youtube.com/watch?v=8OdviDQn5g8'},
          {t:'Sprint to a cone, check back to an imaginary teammate, then sprint to space — 8 reps', v:'https://www.youtube.com/watch?v=MO6Nk8t3keY'},
          {t:'Practice timing a run — wait, then explode into the open space, 8 reps', v:'https://www.youtube.com/watch?v=MO6Nk8t3keY'}
        ]
      },
      {
        title: 'Game IQ — Level 5: Full Decision Making',
        desc: 'The hardest IQ session — combine scanning, reading defenders, and finding space into one flow.',
        tasks: [
          {t:'Watch the full striker movement breakdown', v:'https://www.youtube.com/watch?v=MO6Nk8t3keY'},
          {t:'Cone course: dribble, scan, beat a cone, find space, finish — 5 full reps', v:'https://www.youtube.com/watch?v=qg2SKFk1_D8'},
          {t:'Pick your best rep today and think about what made it work', v:'https://www.youtube.com/watch?v=XCaOePc3lCQ'}
        ]
      }
    ]
  }
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {};
try { state = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e) {}
// state.progress = {speed: 0, kick: 0, iq: 0}  -> current unlocked level index (0-based, completed count)
// state.tasksDone = {trackKey_levelIdx_taskIdx: true}

if (!state.progress) state.progress = {speed:0, kick:0, iq:0};
if (!state.tasksDone) state.tasksDone = {};

function save() { try { localStorage.setItem(SK, JSON.stringify(state)); } catch(e) {} }

let activeTrack = null;
let activeLevel = null;

// ─── RENDER: TRACK PROGRESS BARS ───────────────────────────────────────────────
function renderTracks() {
  let html = '';
  Object.keys(TRACKS).forEach(key => {
    const track = TRACKS[key];
    const completed = state.progress[key];
    const total = track.levels.length;
    const pct = Math.min(100, Math.round((completed/total)*100));
    html += `<div class="track">
      <div class="track-icon">${track.icon}</div>
      <div class="track-name ${track.color}">${track.name}</div>
      <div class="track-bar-track"><div class="track-bar-fill ${track.color}" style="width:${pct}%"></div></div>
      <div class="track-level">Level ${Math.min(completed+1,total)} of ${total}</div>
    </div>`;
  });
  document.getElementById('tracks').innerHTML = html;
}

// ─── RENDER: CHOICE CARDS ──────────────────────────────────────────────────────
function renderChoices() {
  let html = '';
  Object.keys(TRACKS).forEach(key => {
    const track = TRACKS[key];
    const completedCount = state.progress[key];
    const nextLevelIdx = completedCount; // 0-based index of next level to do
    const isMaxed = nextLevelIdx >= track.levels.length;
    const levelIdx = isMaxed ? track.levels.length - 1 : nextLevelIdx;
    const level = track.levels[levelIdx];

    html += `<div class="choice-card ${track.color}" onclick="openSession('${key}', ${levelIdx})">
      <div class="choice-icon">${track.icon}</div>
      <div class="choice-info">
        <div class="choice-track-label ${track.color}">${track.name}</div>
        <div class="choice-title">${level.title.split(': ')[1] || level.title}</div>
        <div class="choice-desc">${level.desc}</div>
        <div class="choice-level">${isMaxed ? 'Mastered — replay anytime' : 'Level ' + (levelIdx+1) + ' of ' + track.levels.length}</div>
      </div>
      <div class="choice-arrow">→</div>
    </div>`;
  });
  document.getElementById('choices').innerHTML = html;
}

// ─── SESSION VIEW ───────────────────────────────────────────────────────────────
function openSession(trackKey, levelIdx) {
  activeTrack = trackKey;
  activeLevel = levelIdx;
  document.getElementById('chooseView').style.display = 'none';
  document.getElementById('sessionView').style.display = 'block';
  renderSession();
  window.scrollTo(0,0);
}

function goBack() {
  activeTrack = null;
  activeLevel = null;
  document.getElementById('sessionView').style.display = 'none';
  document.getElementById('chooseView').style.display = 'block';
  renderTracks();
  renderChoices();
}

function taskKey(trackKey, levelIdx, taskIdx) {
  return trackKey + '_' + levelIdx + '_' + taskIdx;
}

function renderSession() {
  const track = TRACKS[activeTrack];
  const level = track.levels[activeLevel];

  let tasksHtml = '';
  level.tasks.forEach((task, ti) => {
    const k = taskKey(activeTrack, activeLevel, ti);
    const done = !!state.tasksDone[k];
    const isWarmup = !!task.warmup;
    tasksHtml += `<div class="task-card ${done?'done':''} ${isWarmup?'warmup':''}" id="tc_${ti}">
      <div class="task-top" onclick="toggleTask(${ti})">
        <div class="task-cb">${done?'✓':''}</div>
        <div class="task-num">${ti+1}</div>
        <div class="task-text">${isWarmup ? '<span class="warmup-badge">Warm-up</span>' : ''}${task.t}</div>
        ${task.v ? `<a class="task-watch" href="${task.v}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ watch</a>` : ''}
      </div>
    </div>`;
  });

  const allDone = level.tasks.every((_, ti) => state.tasksDone[taskKey(activeTrack, activeLevel, ti)]);
  const alreadyCompleted = activeLevel < state.progress[activeTrack];

  let html = `
    <div class="session-hero ${track.color}">
      <div class="session-hero-label ${track.color}">${track.name} · Level ${activeLevel+1}</div>
      <div class="session-hero-title">${level.title.split(': ')[1] || level.title}</div>
      <div class="session-hero-desc">${level.desc}</div>
    </div>
    <div class="sec-title">Today's tasks</div>
    <div class="task-list">${tasksHtml}</div>
    <button class="complete-btn" id="completeBtn" ${allDone ? '' : 'disabled'} onclick="completeSession()">
      ${alreadyCompleted ? 'Replay Complete ✓' : (allDone ? 'Complete Session →' : 'Finish all tasks to continue')}
    </button>
    <div class="unlock-toast" id="unlockToast">
      <div class="unlock-toast-label">🔓 Unlocked</div>
      <div class="unlock-toast-title" id="unlockTitle"></div>
    </div>
  `;
  document.getElementById('sessionContent').innerHTML = html;
}

function toggleTask(ti) {
  const k = taskKey(activeTrack, activeLevel, ti);
  state.tasksDone[k] = !state.tasksDone[k];
  save();
  renderSession();
}

function completeSession() {
  const track = TRACKS[activeTrack];
  const alreadyCompleted = activeLevel < state.progress[activeTrack];

  if (!alreadyCompleted) {
    state.progress[activeTrack] = activeLevel + 1;
    save();

    const nextIdx = state.progress[activeTrack];
    if (nextIdx < track.levels.length) {
      const nextLevel = track.levels[nextIdx];
      document.getElementById('unlockTitle').textContent = nextLevel.title.split(': ')[1] || nextLevel.title;
      document.getElementById('unlockToast').classList.add('show');
      document.getElementById('completeBtn').textContent = 'Session Complete ✓';
      document.getElementById('completeBtn').disabled = true;
      setTimeout(() => { goBack(); }, 1800);
    } else {
      document.getElementById('unlockTitle').textContent = track.name + ' fully mastered! 🏆';
      document.getElementById('unlockToast').classList.add('show');
      document.getElementById('completeBtn').textContent = 'Session Complete ✓';
      document.getElementById('completeBtn').disabled = true;
      setTimeout(() => { goBack(); }, 1800);
    }
  } else {
    goBack();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderTracks();
renderChoices();
</script>
</body>
</html>
