<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Strike — Solo Training</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --lime:#b8f536;--lime-dim:#7aab1f;--white:#f0eeea;--off:#c8c6bc;--muted:#6a6860;
  --card:#111;--border:rgba(255,255,255,.08);
  --speed:#f59e0b;--kick:#e84c3d;--iq:#38bdf8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:0 16px 60px}

.header{padding:28px 0 18px;text-align:center;border-bottom:1px solid var(--border);margin-bottom:24px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;color:var(--lime);line-height:1}
.logo-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:2px}

/* TRACK PROGRESS BARS */
.tracks{display:flex;gap:10px;margin-bottom:28px}
.track{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.track-icon{font-size:22px;margin-bottom:4px}
.track-name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.track-name.speed{color:var(--speed)}
.track-name.kick{color:var(--kick)}
.track-name.iq{color:var(--iq)}
.track-bar-track{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:6px}
.track-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.track-bar-fill.speed{background:var(--speed)}
.track-bar-fill.kick{background:var(--kick)}
.track-bar-fill.iq{background:var(--iq)}
.track-level{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}

/* SECTION HEADER */
.sec-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:600}

/* SESSION CARDS - CHOICE SCREEN */
.choices{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.choice-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;transition:all .2s;display:flex;flex-direction:column;gap:0}
.choice-card:hover{border-color:rgba(255,255,255,.2)}
.choice-card.speed{border-left:3px solid var(--speed)}
.choice-card.kick{border-left:3px solid var(--kick)}
.choice-card.iq{border-left:3px solid var(--iq)}
.choice-card.locked{opacity:.4;cursor:not-allowed}
.choice-card.locked:hover{transform:none;border-color:var(--border)}
.choice-clickzone{display:flex;align-items:center;gap:16px;cursor:pointer}
.choice-icon{font-size:28px;flex-shrink:0;width:44px;text-align:center}
.choice-info{flex:1}
.choice-track-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.choice-track-label.speed{color:var(--speed)}
.choice-track-label.kick{color:var(--kick)}
.choice-track-label.iq{color:var(--iq)}
.choice-title{font-size:16px;font-weight:600;margin-bottom:3px}
.choice-desc{font-size:12px;color:var(--muted);line-height:1.5}
.choice-level{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px}
.choice-arrow{font-size:18px;color:var(--muted);flex-shrink:0}
.lock-icon{font-size:18px;flex-shrink:0}
.level-dots{display:flex;gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.level-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03);color:var(--muted);font-size:10px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.level-dot:hover{border-color:rgba(255,255,255,.3)}
.level-dot.past{background:rgba(184,245,54,.12);border-color:rgba(184,245,54,.3);color:var(--lime)}
.level-dot.current{border-color:var(--white);color:var(--white)}
.level-dot.locked{opacity:.3;cursor:not-allowed}

.reset-row{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:16px}
.reset-link{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;text-underline-offset:3px;padding:4px}
.reset-link:hover{color:var(--off)}
/* SESSION DETAIL VIEW */
#sessionView{display:none}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;margin-bottom:18px;font-family:'DM Sans',sans-serif;padding:0}
.back-btn:hover{color:var(--off)}
.session-hero{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.session-hero.speed{border-top:3px solid var(--speed)}
.session-hero.kick{border-top:3px solid var(--kick)}
.session-hero.iq{border-top:3px solid var(--iq)}
.session-hero-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.session-hero-label.speed{color:var(--speed)}
.session-hero-label.kick{color:var(--kick)}
.session-hero-label.iq{color:var(--iq)}
.session-hero-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:var(--white);margin-bottom:8px}
.session-hero-desc{font-size:13px;color:var(--off);line-height:1.7}

.task-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.task-card.done{border-color:rgba(184,245,54,.35)}
.task-top{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer}
.task-cb{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s;margin-top:1px}
.task-card.done .task-cb{background:var(--lime);border-color:var(--lime);color:#111}
.task-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0;width:14px;margin-top:3px}
.task-body{flex:1;min-width:0}
.task-badge{display:inline-block;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:3px;margin-bottom:5px}
.task-badge.warmup{background:rgba(184,245,54,.12);color:var(--lime-dim)}
.task-badge.watchbadge{background:rgba(56,189,248,.12);color:var(--iq)}
.task-badge.dobadge{background:rgba(245,158,11,.12);color:var(--speed)}
.task-text-main{font-size:14px;font-weight:600;color:var(--white);line-height:1.4}
.task-card.done .task-text-main{color:var(--muted);text-decoration:line-through}
.task-setup{font-size:12.5px;color:var(--off);line-height:1.6;margin-top:4px}
.task-card.done .task-setup{color:var(--muted)}
.task-reps{font-size:11px;color:var(--lime-dim);font-weight:600;margin-top:5px;font-family:'DM Mono',monospace}
.task-card.done .task-reps{color:var(--muted)}
.task-watch{flex-shrink:0;font-size:11px;color:var(--muted);text-decoration:none;padding:6px 11px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);white-space:nowrap;transition:all .15s;margin-top:1px}
.task-watch:hover{color:var(--lime);border-color:rgba(184,245,54,.3)}
.task-card.warmup{border-style:dashed;background:rgba(255,255,255,.015)}
.task-card.warmup .task-num{color:var(--lime-dim)}

.complete-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--lime);color:#0d1a0d;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.complete-btn:hover{background:#cffb50}
.complete-btn:disabled{opacity:.3;cursor:not-allowed}

/* UNLOCK TOAST */
.unlock-toast{display:none;background:rgba(184,245,54,.08);border:1px solid rgba(184,245,54,.3);border-radius:10px;padding:16px 18px;margin-top:14px;text-align:center}
.unlock-toast.show{display:block;animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.unlock-toast-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--lime-dim);margin-bottom:4px}
.unlock-toast-title{font-size:15px;font-weight:600}

.intro-note{font-size:12px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.7;padding:0 10px}

@media(max-width:480px){
  .tracks{flex-direction:column}
  .logo{font-size:36px}
  .session-hero-title{font-size:26px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Summer Strike</div>
    <div class="logo-sub">Solo Striker Training</div>
  </div>

  <p class="intro-note">Pick any session below. Speed, Power, or IQ — train whatever you want, whenever you want. Finish a session and the next, harder one in that track unlocks.</p>

  <div class="tracks" id="tracks"></div>

  <div id="chooseView">
    <div class="sec-title">Choose your next session</div>
    <div class="choices" id="choices"></div>
  </div>

  <div id="sessionView">
    <button class="back-btn" onclick="goBack()">← Back to sessions</button>
    <div id="sessionContent"></div>
  </div>
</div>

<script>
const SK = 'ss_solo_v1';

// ─── DATA: each track has progressive levels. Completing level N unlocks level N+1. ───
const TRACKS = {
  speed: {
    name: 'Speed', icon: '⚡', color: 'speed',
    levels: [
      {
        title: 'Speed — Level 1: First Steps',
        desc: 'Learn the basic sprint position and how to push off the ground hard.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: how to set up a falling start', v:'https://www.youtube.com/watch?v=_u5pyVYjmgk'},
          {kind:'do', t:'Falling starts', setup:'Stand tall, lean forward from your ankles until you have to catch yourself with a sprint step.', reps:'5 reps', v:'https://www.youtube.com/watch?v=_u5pyVYjmgk'},
          {kind:'do', t:'Sprints', setup:'Mark a 15m line with 2 cones. Sprint as fast as you can from one to the other, walk back to recover.', reps:'5 reps', v:'https://www.youtube.com/watch?v=2Dt2DbjAKbo'}
        ]
      },
      {
        title: 'Speed — Level 2: Building Speed',
        desc: 'Now we add more sprints and a longer distance. Push a little harder than last time.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: proper A-skip form', v:'https://www.youtube.com/watch?v=twmQ9cpCI48'},
          {kind:'do', t:'A-skip drill', setup:'Mark a 15m line. Skip forward driving your knee up high each step.', reps:'2 sets of 15m', v:'https://www.youtube.com/watch?v=twmQ9cpCI48'},
          {kind:'do', t:'Sprints', setup:'Mark a 20m line with 2 cones. Full sprint each rep, take a full rest before the next one.', reps:'6 reps', v:'https://www.youtube.com/watch?v=2Dt2DbjAKbo'},
          {kind:'do', t:'Agility ladder', setup:'Lay your ladder flat. Move through it quickly using any pattern you know.', reps:'2 trips through', v:'https://www.youtube.com/watch?v=6NnGQl-TZHs'}
        ]
      },
      {
        title: 'Speed — Level 3: Change of Direction',
        desc: 'Speed in a straight line is good. Speed that changes direction is better. Today we add cuts.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: how to cut hard without losing speed', v:'https://www.youtube.com/watch?v=f6TRC2zHkJY'},
          {kind:'do', t:'Cut left', setup:'Place a cone 20m away. Sprint to it, plant your outside foot, cut hard left, then sprint 5 more meters.', reps:'5 reps', v:'https://www.youtube.com/watch?v=f6TRC2zHkJY'},
          {kind:'do', t:'Cut right', setup:'Same setup as before — sprint, plant, cut hard right, sprint 5 more meters.', reps:'5 reps', v:'https://www.youtube.com/watch?v=f6TRC2zHkJY'}
        ]
      },
      {
        title: 'Speed — Level 4: Top Speed',
        desc: 'Time to find your top gear. These sprints are longer — give full effort and take full rest.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: top speed sprint mechanics', v:'https://www.youtube.com/watch?v=BswRzWK5e0o'},
          {kind:'do', t:'Sprints', setup:'Mark a 30m line. Max effort every rep, rest 60 seconds between each one.', reps:'6 reps', v:'https://www.youtube.com/watch?v=BswRzWK5e0o'},
          {kind:'do', t:'Long sprints', setup:'Mark a 40m line. Push all the way through the finish line — keep your speed up to the end.', reps:'2 reps', v:'https://www.youtube.com/watch?v=BswRzWK5e0o'}
        ]
      },
      {
        title: 'Speed — Level 5: Game Speed',
        desc: 'The hardest speed session. Sprint, recover fast, sprint again — just like a real match.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: quickness and agility drills', v:'https://www.youtube.com/shorts/YQ2IGUOrt6Q'},
          {kind:'do', t:'Quick sprints', setup:'Mark a 20m line. Sprint, then only rest 30 seconds before going again.', reps:'8 reps', v:'https://www.youtube.com/watch?v=2Dt2DbjAKbo'},
          {kind:'do', t:'Finisher sprint', setup:'Mark a 40m line. One final sprint — make it your fastest of the day.', reps:'1 rep', v:'https://www.youtube.com/watch?v=BswRzWK5e0o'}
        ]
      }
    ]
  },
  kick: {
    name: 'Power Kicks', icon: '🎯', color: 'kick',
    levels: [
      {
        title: 'Power Kicks — Level 1: The Basics',
        desc: 'Every powerful shot starts with the same setup. Learn it slow before we add speed.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: proper shooting technique', v:'https://www.youtube.com/shorts/W6Kv5jVQ7bo'},
          {kind:'do', t:'Standing shots', setup:'Place the ball still on the ground. Plant your non-kicking foot beside the ball, lock your ankle, strike through the middle.', reps:'10 reps', v:'https://www.youtube.com/watch?v=_f9ZIh8ESn4'},
          {kind:'do', t:'Both feet', setup:'Same technique as before — same setup, alternate feet each shot.', reps:'10 reps', v:'https://www.youtube.com/watch?v=_f9ZIh8ESn4'}
        ]
      },
      {
        title: 'Power Kicks — Level 2: Adding Power',
        desc: 'Same technique, more power. The power comes from your hips, not your leg muscles.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: where shooting power comes from', v:'https://www.youtube.com/watch?v=ipzEbfqAi2Y'},
          {kind:'do', t:'Power shots', setup:'Ball still on the ground. Same setup as before, but focus on turning your hips through the ball as you strike.', reps:'12 reps', v:'https://www.youtube.com/watch?v=ipzEbfqAi2Y'},
          {kind:'do', t:'Weak foot shots', setup:'Same setup and technique, weak foot only.', reps:'10 reps', v:'https://www.youtube.com/watch?v=ipzEbfqAi2Y'}
        ]
      },
      {
        title: 'Power Kicks — Level 3: Moving Shots',
        desc: 'Shooting while standing still is easy. Now let us shoot while moving — like in a real game.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: how to shoot while moving', v:'https://www.youtube.com/watch?v=_f9ZIh8ESn4'},
          {kind:'do', t:'Moving shots', setup:'Place the ball 5m away. Jog up to it and strike it on the move without slowing down.', reps:'15 reps', v:'https://www.youtube.com/watch?v=_f9ZIh8ESn4'},
          {kind:'do', t:'Corner shots', setup:'Pick a low target in each corner of the goal. Aim for it, low and hard, every shot.', reps:'10 reps', v:'https://www.youtube.com/watch?v=1zNDn5ZKuBU'}
        ]
      },
      {
        title: 'Power Kicks — Level 4: Toss & Volley',
        desc: 'Volleys are tricky — you have to time the strike perfectly. Toss the ball up yourself and practice.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: volley timing and technique', v:'https://www.youtube.com/watch?v=J1dfNXY3yMI'},
          {kind:'do', t:'Toss-and-volley', setup:'Toss the ball up about head height yourself, then strike it cleanly before it bounces.', reps:'10 reps', v:'https://www.youtube.com/watch?v=J1dfNXY3yMI'},
          {kind:'do', t:'Long shots', setup:'Stand outside the box. Aim low into the corners, full power.', reps:'15 reps', v:'https://www.youtube.com/watch?v=1zNDn5ZKuBU'}
        ]
      },
      {
        title: 'Power Kicks — Level 5: Game Finisher',
        desc: 'The hardest shooting session. Sprint first, then finish — exactly how it feels in a real match.',
        tasks: [
          {kind:'warmup', t:'Dynamic warm-up', setup:'5 minutes: leg swings, high knees, hip circles.', v:'https://www.youtube.com/shorts/BJTLAs43nkE'},
          {kind:'watch', t:'Watch: finishing at game speed', v:'https://www.youtube.com/watch?v=qg2SKFk1_D8'},
          {kind:'do', t:'Sprint & finish', setup:'Place the ball 20m from goal. Sprint to it, then strike on arrival — full effort every time.', reps:'10 reps', v:'https://www.youtube.com/watch?v=qg2SKFk1_D8'},
          {kind:'do', t:'Weak foot finishing', setup:'Same sprint-and-strike setup, weak foot only.', reps:'10 reps', v:'https://www.youtube.com/watch?v=ipzEbfqAi2Y'}
        ]
      }
    ]
  },
  iq: {
    name: 'Game IQ', icon: '🧠', color: 'iq',
    levels: [
      {
        title: 'Game IQ — Level 1: Look First',
        desc: 'The best players check around them before the ball even arrives. Time to build that habit.',
        tasks: [
          {kind:'watch', t:'Watch: why checking your shoulder matters', v:'https://www.youtube.com/shorts/WO07VKhU3Wk'},
          {kind:'do', t:'Wall passing with scanning', setup:'Stand a few steps from a wall. Pass the ball against it — before each touch, quickly look behind you.', reps:'15 reps', v:'https://www.youtube.com/watch?v=1oxaF_Mx6Ok'},
          {kind:'do', t:'Angled receiving', setup:'Toss the ball to yourself or use a wall. Practice receiving it side-on instead of facing it straight on.', reps:'10 reps', v:'https://www.youtube.com/watch?v=zk2Sua-rr3Y'}
        ]
      },
      {
        title: 'Game IQ — Level 2: When to Scan',
        desc: 'There are 3 perfect moments to look around during a game. Today we learn what they are.',
        tasks: [
          {kind:'watch', t:'Watch: the 3 best moments to scan', v:'https://www.youtube.com/shorts/K8jTWP6Stj4'},
          {kind:'do', t:'Wall passing — double scan', setup:'Same wall passing setup as before. This time scan once before you receive, and once again right after.', reps:'15 reps', v:'https://www.youtube.com/watch?v=1oxaF_Mx6Ok'},
          {kind:'do', t:'Cone dribble, head up', setup:'Set up 4 cones in a line, 2m apart. Dribble through them keeping your head up the whole time.', reps:'4 trips through', v:'https://www.youtube.com/watch?v=7Ot-JKwKFi4'}
        ]
      },
      {
        title: 'Game IQ — Level 3: Reading a Defender',
        desc: 'Cones can act like a defender. Learn to read which way to go based on how they are facing.',
        tasks: [
          {kind:'watch', t:'Watch: a simple 1v1 move to learn', v:'https://www.youtube.com/shorts/PQ_P_-p9W-k'},
          {kind:'do', t:'Beat the cone', setup:'Place one cone as a defender. Dribble straight at it, fake one direction, then go the other way.', reps:'10 reps', v:'https://www.youtube.com/watch?v=5mQ4QbKHT_Y'},
          {kind:'do', t:'Beat the cone and shoot', setup:'Same setup as before. This time, finish with a shot on goal every time.', reps:'10 reps', v:'https://www.youtube.com/watch?v=5mQ4QbKHT_Y'}
        ]
      },
      {
        title: 'Game IQ — Level 4: Finding Space',
        desc: 'Great strikers do not stand still. Learn to find pockets of space and attack them.',
        tasks: [
          {kind:'watch', t:'Watch: how strikers find space', v:'https://www.youtube.com/watch?v=8OdviDQn5g8'},
          {kind:'do', t:'Check and sprint', setup:'Place a cone 15m away as your "teammate." Sprint to it, check back as if receiving a pass, then sprint into open space.', reps:'8 reps', v:'https://www.youtube.com/watch?v=MO6Nk8t3keY'},
          {kind:'do', t:'Timed run', setup:'Pick a spot of open space 15-20m away. Wait, then explode into a sprint toward it on your own timing.', reps:'8 reps', v:'https://www.youtube.com/watch?v=MO6Nk8t3keY'}
        ]
      },
      {
        title: 'Game IQ — Level 5: Full Decision Making',
        desc: 'The hardest IQ session — combine scanning, reading defenders, and finding space into one flow.',
        tasks: [
          {kind:'watch', t:'Watch: full striker movement breakdown', v:'https://www.youtube.com/watch?v=MO6Nk8t3keY'},
          {kind:'do', t:'Full cone course', setup:'Set up 3 cones in a path to goal. Dribble in, scan, beat the first cone, find space, then finish.', reps:'5 full reps', v:'https://www.youtube.com/watch?v=qg2SKFk1_D8'},
          {kind:'do', t:'Reflect', setup:'Think back over the course reps you just did.', reps:'Pick your best one and think about what made it work', v:'https://www.youtube.com/watch?v=XCaOePc3lCQ'}
        ]
      }
    ]
  }

};

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {};
try { state = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e) {}
// state.progress = {speed: 0, kick: 0, iq: 0}  -> current unlocked level index (0-based, completed count)
// state.tasksDone = {trackKey_levelIdx_taskIdx: true}

if (!state.progress) state.progress = {speed:0, kick:0, iq:0};
if (!state.tasksDone) state.tasksDone = {};

function save() { try { localStorage.setItem(SK, JSON.stringify(state)); } catch(e) {} }

let activeTrack = null;
let activeLevel = null;

// ─── RENDER: TRACK PROGRESS BARS ───────────────────────────────────────────────
function renderTracks() {
  let html = '';
  Object.keys(TRACKS).forEach(key => {
    const track = TRACKS[key];
    const completed = state.progress[key];
    const total = track.levels.length;
    const pct = Math.min(100, Math.round((completed/total)*100));
    html += `<div class="track">
      <div class="track-icon">${track.icon}</div>
      <div class="track-name ${track.color}">${track.name}</div>
      <div class="track-bar-track"><div class="track-bar-fill ${track.color}" style="width:${pct}%"></div></div>
      <div class="track-level">Level ${Math.min(completed+1,total)} of ${total}</div>
    </div>`;
  });
  document.getElementById('tracks').innerHTML = html;
}

// ─── RENDER: CHOICE CARDS ──────────────────────────────────────────────────────
function renderChoices() {
  let html = '';
  Object.keys(TRACKS).forEach(key => {
    const track = TRACKS[key];
    const completedCount = state.progress[key];
    const nextLevelIdx = completedCount; // 0-based index of next level to do
    const isMaxed = nextLevelIdx >= track.levels.length;
    const levelIdx = isMaxed ? track.levels.length - 1 : nextLevelIdx;
    const level = track.levels[levelIdx];

    // small row of level dots — tap any unlocked level to jump straight to it
    let dotsHtml = '<div class="level-dots">';
    track.levels.forEach((lv, li) => {
      const unlocked = li <= completedCount; // unlocked levels: all completed ones + the current next one
      const isCurrent = li === levelIdx;
      const isPastComplete = li < completedCount;
      let cls = 'level-dot';
      if (!unlocked) cls += ' locked';
      if (isCurrent) cls += ' current';
      if (isPastComplete) cls += ' past';
      dotsHtml += `<button class="${cls}" ${unlocked ? `onclick="event.stopPropagation();openSession('${key}',${li})"` : 'disabled'} title="Level ${li+1}">${isPastComplete?'✓':(li+1)}</button>`;
    });
    dotsHtml += '</div>';

    html += `<div class="choice-card ${track.color}">
      <div class="choice-clickzone" onclick="openSession('${key}', ${levelIdx})">
        <div class="choice-icon">${track.icon}</div>
        <div class="choice-info">
          <div class="choice-track-label ${track.color}">${track.name}</div>
          <div class="choice-title">${level.title.split(': ')[1] || level.title}</div>
          <div class="choice-desc">${level.desc}</div>
          <div class="choice-level">${isMaxed ? 'Mastered — replay anytime' : 'Level ' + (levelIdx+1) + ' of ' + track.levels.length}</div>
        </div>
        <div class="choice-arrow">→</div>
      </div>
      ${completedCount > 0 ? dotsHtml : ''}
    </div>`;
  });
  document.getElementById('choices').innerHTML = html;
}

// ─── SESSION VIEW ───────────────────────────────────────────────────────────────
function openSession(trackKey, levelIdx) {
  activeTrack = trackKey;
  activeLevel = levelIdx;
  document.getElementById('chooseView').style.display = 'none';
  document.getElementById('sessionView').style.display = 'block';
  renderSession();
  window.scrollTo(0,0);
}

function goBack() {
  activeTrack = null;
  activeLevel = null;
  document.getElementById('sessionView').style.display = 'none';
  document.getElementById('chooseView').style.display = 'block';
  renderTracks();
  renderChoices();
}

function taskKey(trackKey, levelIdx, taskIdx) {
  return trackKey + '_' + levelIdx + '_' + taskIdx;
}

function renderSession() {
  const track = TRACKS[activeTrack];
  const level = track.levels[activeLevel];

  let tasksHtml = '';
  level.tasks.forEach((task, ti) => {
    const k = taskKey(activeTrack, activeLevel, ti);
    const done = !!state.tasksDone[k];
    const kind = task.kind || 'do';
    const badgeMap = {warmup:'Warm-up', watch:'Watch first', do:'Do this'};
    const badgeClassMap = {warmup:'warmup', watch:'watchbadge', do:'dobadge'};
    const badge = badgeMap[kind];
    const badgeClass = badgeClassMap[kind];

    let bodyHtml = `<div class="task-text-main">${task.t}</div>`;
    if (task.setup) {
      bodyHtml += `<div class="task-setup">${task.setup}</div>`;
    }
    if (task.reps) {
      bodyHtml += `<div class="task-reps">${task.reps}</div>`;
    }

    tasksHtml += `<div class="task-card ${done?'done':''} ${kind==='warmup'?'warmup':''}" id="tc_${ti}">
      <div class="task-top" onclick="toggleTask(${ti})">
        <div class="task-cb">${done?'✓':''}</div>
        <div class="task-num">${ti+1}</div>
        <div class="task-body">
          <span class="task-badge ${badgeClass}">${badge}</span>
          ${bodyHtml}
        </div>
        ${task.v ? `<a class="task-watch" href="${task.v}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ ${kind==='watch'||kind==='warmup'?'watch':'clip'}</a>` : ''}
      </div>
    </div>`;
  });

  const allDone = level.tasks.every((_, ti) => state.tasksDone[taskKey(activeTrack, activeLevel, ti)]);
  const alreadyCompleted = activeLevel < state.progress[activeTrack];

  let html = `
    <div class="session-hero ${track.color}">
      <div class="session-hero-label ${track.color}">${track.name} · Level ${activeLevel+1}</div>
      <div class="session-hero-title">${level.title.split(': ')[1] || level.title}</div>
      <div class="session-hero-desc">${level.desc}</div>
    </div>
    <div class="sec-title">Today's tasks</div>
    <div class="task-list">${tasksHtml}</div>
    <button class="complete-btn" id="completeBtn" ${allDone ? '' : 'disabled'} onclick="completeSession()">
      ${alreadyCompleted ? 'Replay Complete ✓' : (allDone ? 'Complete Session →' : 'Finish all tasks to continue')}
    </button>
    <div class="unlock-toast" id="unlockToast">
      <div class="unlock-toast-label">🔓 Unlocked</div>
      <div class="unlock-toast-title" id="unlockTitle"></div>
    </div>
    <div class="reset-row">
      <button class="reset-link" onclick="resetTasks()">↺ Uncheck all tasks on this level</button>
      ${alreadyCompleted ? `<button class="reset-link" onclick="rewindProgress()">⏪ Move progress back to this level</button>` : ''}
    </div>
  `;
  document.getElementById('sessionContent').innerHTML = html;
}

function toggleTask(ti) {
  const k = taskKey(activeTrack, activeLevel, ti);
  state.tasksDone[k] = !state.tasksDone[k];
  save();
  renderSession();
  renderTracks();
}

function resetTasks() {
  const track = TRACKS[activeTrack];
  const level = track.levels[activeLevel];
  level.tasks.forEach((_, ti) => {
    delete state.tasksDone[taskKey(activeTrack, activeLevel, ti)];
  });
  save();
  renderSession();
  renderTracks();
}

function rewindProgress() {
  // Move the track's unlocked progress back to this level (so this level is the "next" one again)
  if (activeLevel < state.progress[activeTrack]) {
    state.progress[activeTrack] = activeLevel;
    save();
  }
  renderSession();
  renderTracks();
}

function completeSession() {
  const track = TRACKS[activeTrack];
  const alreadyCompleted = activeLevel < state.progress[activeTrack];

  if (!alreadyCompleted) {
    state.progress[activeTrack] = activeLevel + 1;
    save();

    const nextIdx = state.progress[activeTrack];
    if (nextIdx < track.levels.length) {
      const nextLevel = track.levels[nextIdx];
      document.getElementById('unlockTitle').textContent = nextLevel.title.split(': ')[1] || nextLevel.title;
      document.getElementById('unlockToast').classList.add('show');
      document.getElementById('completeBtn').textContent = 'Session Complete ✓';
      document.getElementById('completeBtn').disabled = true;
      setTimeout(() => { goBack(); }, 1800);
    } else {
      document.getElementById('unlockTitle').textContent = track.name + ' fully mastered! 🏆';
      document.getElementById('unlockToast').classList.add('show');
      document.getElementById('completeBtn').textContent = 'Session Complete ✓';
      document.getElementById('completeBtn').disabled = true;
      setTimeout(() => { goBack(); }, 1800);
    }
  } else {
    goBack();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderTracks();
renderChoices();
</script>
</body>
</html>
